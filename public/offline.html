<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizApp — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(79, 70, 229, 0.12);
    }
    .icon-wrap {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-wrap img { width: 52px; height: 52px; }
    h1 { font-size: 22px; font-weight: 800; color: #1e293b; margin-bottom: 8px; }
    p { font-size: 15px; color: #64748b; line-height: 1.6; margin-bottom: 32px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fef3c7; color: #92400e;
      border: 1px solid #fde68a;
      padding: 6px 14px; border-radius: 999px;
      font-size: 13px; font-weight: 600; margin-bottom: 32px;
    }
    .badge-dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .note { margin-top: 20px; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <img src="/icons/icon-192x192.png" alt="BizApp" />
    </div>
    <div class="badge">
      <div class="badge-dot"></div>
      You are offline
    </div>
    <h1>No Internet Connection</h1>
    <p>BizApp works offline for most features. Your data is safely stored on this device and will sync automatically when you reconnect.</p>
    <a class="btn" href="/">
      ↩ Go back to App
    </a>
    <p class="note">All your invoices, inventory and customer data are available offline.</p>
  </div>
</body>
</html>
